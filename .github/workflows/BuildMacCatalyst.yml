name: Build Z2X-Programmer-MacCatalyst

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    
  workflow_dispatch:
      inputs:
        update_release:
          description: 'Latest Release aktualisieren?'
          required: true
          type: boolean
          default: true

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip]')"
    runs-on: self-hosted
    env:
      PROJECT_PATH: "Z2X-Programmer/Z2X-Programmer.csproj"
      RID: "maccatalyst-x64"
      OUTPUT_DIR: "publish"
      ZIP_NAME: "Z2X-Programmer-Intel-x64.zip"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Clean previous builds
        run: |
          rm -rf ${{ env.OUTPUT_DIR }}
          dotnet clean ${{ env.PROJECT_PATH }} -c Release

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }} -r ${{ env.RID }}

      - name: Build and Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
          -c Release \
          -f net10.0-maccatalyst \
          -r ${{ env.RID }} \
          --no-restore \
          -o ${{ env.OUTPUT_DIR }}

      - name: Create ZIP Archive
        run: |
          cd ${{ env.OUTPUT_DIR }}
          zip -r ../${{ env.ZIP_NAME }} *.app

      - name: Move latest tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git tag -f latest
          git push origin -f latest

      - name: Update Latest Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Z2X Programmer - Latest Mac Catalyst Build"
          body: "Automatischer Mac Catalyst Build vom aktuellen Stand."
          draft: false
          prerelease: false
          make_latest: true
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Tag Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}