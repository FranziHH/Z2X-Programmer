name: Build Z2X-Programmer-Android

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:
      inputs:
        update_release:
          description: 'Latest Release aktualisieren?'
          required: true
          type: boolean
          default: true
          
jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip]')"

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Keystore File
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" > myapp.keystore.asc
        gpg -d --passphrase "${{ secrets.KEYSTORE_PASSWORD_GPG }}" --batch myapp.keystore.asc > myapp.keystore
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install MAUI workload
      run: dotnet workload install maui
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build Z2X-Programmer/Z2X-Programmer.csproj -c Release -f net10.0-android36.0 /p:AndroidSigningKeyStore=myapp.keystore /p:AndroidSigningKeyAlias=Z2X-Programmer /p:AndroidSigningKeyPass="${{ secrets.KEYSTORE_PASSWORD }}" /p:AndroidSigningStorePass="${{ secrets.KEYSTORE_PASSWORD_ALIAS }}" --no-restore
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4.6.2
      with:
        name: Z2X-Programmer-Android
        # path: ./**/com.peterk78.z2xprogrammer-Signed.apk
        path: Z2X-Programmer/bin/Release/net10.0-android36.0/com.peterk78.z2xprogrammer-Signed.apk

# --- SCHRITT 1: LATEST RELEASE AKTUALISIEREN ---
    - name: Update Latest Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Z2X Programmer - Latest Build"
        body: "Automatischer Build vom aktuellen Stand."
        draft: false
        prerelease: false
        make_latest: true
        files: |
          Z2X-Programmer/bin/Release/net10.0-android36.0/com.peterk78.z2xprogrammer-Signed.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # --- SCHRITT 2: TAG RELEASE ERSTELLEN (NUR WENN EIN TAG DIE PIPELINE AUSGELÖST HAT) ---
    - name: Create Tag Release
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: "Release ${{ github.ref_name }}"
        draft: false
        prerelease: false
        files: |
          Z2X-Programmer/bin/Release/net10.0-android36.0/com.peterk78.z2xprogrammer-Signed.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        